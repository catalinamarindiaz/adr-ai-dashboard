<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meta Ads · ActasDeReuniones.AI</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f5f5f7;color:#1c1c1e;font-size:13px}
.page{max-width:920px;margin:0 auto;padding:24px 16px}
.loading{text-align:center;padding:80px 20px;color:#636366;font-size:14px}
@keyframes spin{to{transform:rotate(360deg)}}
.spin{display:inline-block;width:20px;height:20px;border:2px solid #e5e5ea;border-top-color:#534AB7;border-radius:50%;animation:spin .8s linear infinite;margin-right:8px;vertical-align:middle}

/* Header */
.hdr{display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:12px;margin-bottom:20px;padding-bottom:16px;border-bottom:1px solid #e5e5ea}
.hdr h1{font-size:16px;font-weight:600;color:#1c1c1e;margin-bottom:6px}
.badges{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px}
.bdg{font-size:11px;font-weight:500;padding:3px 9px;border-radius:20px;white-space:nowrap}
.b-purple{background:#EEEDFE;color:#3C3489}
.b-green{background:#EAF3DE;color:#27500A}
.b-gray{background:#f2f2f7;color:#636366}
.b-amber{background:#FAEEDA;color:#633806}
.hdr-right{font-size:11px;color:#8e8e93;text-align:right;line-height:1.6}

/* KPI grid */
.kgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:16px}
.kcard{background:#fff;border:1px solid #e5e5ea;border-radius:12px;padding:14px 16px}
.kcard-lbl{font-size:11px;color:#8e8e93;margin-bottom:5px;font-weight:500}
.kcard-val{font-size:22px;font-weight:600;color:#1c1c1e;line-height:1.1}
.kcard-sub{font-size:11px;color:#8e8e93;margin-top:3px}
.kcard-delta{font-size:11px;font-weight:600;margin-top:5px}
.up{color:#27500A}.dn{color:#A32D2D}.neutral{color:#534AB7}

/* Cards */
.card{background:#fff;border:1px solid #e5e5ea;border-radius:12px;padding:16px 20px;margin-bottom:14px}
.sec{font-size:10px;font-weight:600;color:#8e8e93;text-transform:uppercase;letter-spacing:.06em;margin-bottom:12px}

/* Tabla campañas */
.tbl{width:100%;border-collapse:collapse;font-size:12px}
.tbl th{font-size:10px;font-weight:600;color:#8e8e93;text-align:right;padding:0 8px 8px;white-space:nowrap}
.tbl th:first-child{text-align:left}
.tbl td{padding:9px 8px;border-top:1px solid #f2f2f7;text-align:right;color:#3a3a3c;white-space:nowrap}
.tbl td:first-child{text-align:left;color:#1c1c1e}
.tbl tr:last-child td{font-weight:600;border-top:2px solid #e5e5ea}
.camp-name{font-weight:500;font-size:12px}
.camp-sub{font-size:10px;color:#8e8e93;margin-top:2px}
.cpm-best{color:#27500A;font-weight:600}
.cpm-warn{color:#A32D2D;font-weight:600}

/* Gráficos */
.chart-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
.chart-wrap{position:relative;height:200px;margin-top:8px}
.chart-wrap2{position:relative;height:160px;margin-top:8px}
.legend{display:flex;flex-wrap:wrap;gap:12px;font-size:11px;color:#636366;margin-bottom:6px}
.leg-dot{width:10px;height:10px;border-radius:2px;display:inline-block;margin-right:4px;vertical-align:middle}

/* Web KPIs */
.wgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:8px;margin-bottom:10px}
.wcard{background:#f5f5f7;border-radius:8px;padding:10px 12px;text-align:center}
.wcard-lbl{font-size:10px;color:#8e8e93;margin-bottom:3px}
.wcard-val{font-size:17px;font-weight:600;color:#1c1c1e}
.wcard-sub{font-size:10px;color:#8e8e93;margin-top:2px}

/* Next steps */
.next{display:flex;gap:10px;align-items:flex-start;padding:11px 0;border-bottom:1px solid #f2f2f7}
.next:last-child{border-bottom:none}
.num{width:22px;height:22px;border-radius:50%;background:#EEEDFE;color:#3C3489;font-size:11px;font-weight:600;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.ntitle{font-size:12px;font-weight:600;color:#1c1c1e;margin-bottom:3px}
.ndesc{font-size:11px;color:#636366;line-height:1.5}
.ntag{font-size:10px;font-weight:600;margin-top:4px}

/* Anuncios grid */
.ad-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.ad-card{background:#fff;border:1px solid #e5e5ea;border-radius:10px;overflow:hidden}
.ad-card.best{border-color:#A5D6A7;border-width:2px}
.ad-card.warn{border-color:#FFCDD2;border-width:2px}
.ad-img{width:100%;height:110px;background:#f2f2f7;display:flex;align-items:center;justify-content:center;color:#c7c7cc;font-size:28px}
.ad-img img{width:100%;height:110px;object-fit:cover;display:block}
.ad-body{padding:9px 10px}
.ad-name{font-size:11px;font-weight:500;color:#1c1c1e;line-height:1.35;margin-bottom:6px;min-height:32px}
.ad-stat{display:flex;justify-content:space-between;margin-bottom:2px}
.ad-lbl{font-size:9px;color:#8e8e93}
.ad-val{font-size:9px;font-weight:600;color:#3a3a3c}
.ad-bar{height:3px;background:#f2f2f7;border-radius:2px;margin:5px 0 4px}
.ad-bar-fill{height:100%;border-radius:2px;background:#534AB7}
.ad-recall{font-size:10px;color:#534AB7;font-weight:600;margin-top:3px}
.chip{font-size:9px;font-weight:600;padding:1px 5px;border-radius:3px;margin-left:4px;vertical-align:middle}
.chip-g{background:#EAF3DE;color:#27500A}
.chip-r{background:#FFEBEE;color:#A32D2D}
.chip-p{background:#EEEDFE;color:#3C3489}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.pulsing{animation:pulse 1.2s ease-in-out infinite}

/* Notice */
.notice{background:#EEEDFE;border:1px solid #AFA9EC;border-radius:8px;padding:9px 13px;font-size:11px;color:#3C3489;margin-bottom:14px}

@media(max-width:600px){.chart-grid{grid-template-columns:1fr}.ad-grid{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>
<div class="page">
  <div id="root"><div class="loading"><span class="spin"></span>Cargando datos de Meta Ads…</div></div>
</div>

<script>
/* ── Configuración ──────────────────────────────────────────── */
const SHEET_ID = '1dfWFCi8MLJa1aB7-v6Jo-Wig9ki7PZ0FCvkVE_NZwXU';
const TC = 950;
const AR_BENCH = 9.56;
const META_V = 'v21.0';
const META_ACCT = 'act_631853038833781';

/* ── GA4 Fallback — se sobreescribe con datos del Sheet al correr actualizarGA4() ── */
const GA4_CANALES_FB = [
  {canal:'Direct',         usuarios:189, nuevos:126, ventas:19, ingresos:2730000},
  {canal:'Cross-network',  usuarios:163, nuevos:146, ventas:9,  ingresos:2218000},
  {canal:'Paid Search',    usuarios:20,  nuevos:12,  ventas:5,  ingresos:256250},
  {canal:'Organic Search', usuarios:140, nuevos:127, ventas:4,  ingresos:420000},
  {canal:'Organic Social', usuarios:22,  nuevos:15,  ventas:2,  ingresos:105000},
  {canal:'Paid Social',    usuarios:347, nuevos:338, ventas:0,  ingresos:0},
];
const GA4_CIUDADES_FB = [
  {ciudad:'Bogotá',          usuarios:177, ventas:11, ingresos:1166250},
  {ciudad:'Medellín',        usuarios:120, ventas:7,  ingresos:695000},
  {ciudad:'Envigado',        usuarios:12,  ventas:3,  ingresos:1380000},
  {ciudad:'Bucaramanga',     usuarios:19,  ventas:2,  ingresos:270000},
  {ciudad:'Barrancabermeja', usuarios:3,   ventas:3,  ingresos:180000},
];

/* ── Helpers ────────────────────────────────────────────────── */
function nv(v){ return parseFloat(String(v||'0').replace(/\./g,'').replace(',','.'))||0; }
function usd(clp){ return clp/TC; }
function fU(v){ return '$'+v.toFixed(2); }
function fU3(v){ return '$'+v.toFixed(3); }
function fN(v){ return Math.round(v).toLocaleString('es-CO'); }
function fPct(v){ return v.toFixed(2)+'%'; }

const NOW = new Date();
const MESES = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
function mesNombre(){ return MESES[NOW.getMonth()]; }
function mesCap(){ const m=mesNombre(); return m.charAt(0).toUpperCase()+m.slice(1); }
function periodo(){ return `1–${NOW.getDate()} ${mesNombre()} ${NOW.getFullYear()} · ${NOW.getDate()} días`; }

/* ── Fetch Google Sheet (JSONP) ─────────────────────────────── */
function fetchSheet(sheet){
  return new Promise((resolve, reject) => {
    const cb = 'gviz_' + Date.now() + '_' + Math.floor(Math.random()*9999);
    const timer = setTimeout(() => { delete window[cb]; reject(new Error('Timeout: '+sheet)); }, 15000);
    window[cb] = (data) => {
      clearTimeout(timer); delete window[cb];
      try {
        const hdr = data.table.cols.map(c => c.label || '');
        const rows = (data.table.rows || []).map(r => (r.c||[]).map(c => {
          if(!c || c.v===null || c.v===undefined) return '';
          return (c.f!==undefined && c.f!==null) ? c.f : c.v;
        }));
        resolve([hdr, ...rows]);
      } catch(e){ reject(e); }
    };
    const s = document.createElement('script');
    s.src = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json;responseHandler:${cb}&sheet=${encodeURIComponent(sheet)}`;
    s.onerror = () => { clearTimeout(timer); reject(new Error('Error cargando: '+sheet)); };
    document.head.appendChild(s);
  });
}

/* ── Token Meta ─────────────────────────────────────────────── */
const _DEFAULT_TOK = '';
function getToken(){ try{ return localStorage.getItem('META_TOKEN')||_DEFAULT_TOK; }catch(e){ return _DEFAULT_TOK; } }
function saveToken(t){ try{ if(t) localStorage.setItem('META_TOKEN',t.trim()); }catch(e){} }
function promptToken(){
  const t = window.prompt('Pega tu Meta Access Token (se guarda en este navegador):','');
  if(t && t.trim()){ saveToken(t); location.reload(); }
}

async function metaFetch(path, params){
  const token = getToken(); if(!token) return null;
  const url = new URL('https://graph.facebook.com/'+META_V+'/'+path);
  url.searchParams.set('access_token', token);
  Object.entries(params||{}).forEach(([k,v])=>url.searchParams.set(k,v));
  try{
    const r = await fetch(url.toString());
    const j = await r.json();
    if(j.error){ console.warn('Meta API:', j.error.message); return null; }
    return j;
  }catch(e){ console.warn('metaFetch:', e); return null; }
}

async function loadAdMetricsFromMeta(){
  const data = await metaFetch(META_ACCT+'/ads', {
    fields: 'name,creative{thumbnail_url,image_url},insights.date_preset(this_month){reach,impressions,cpm}',
    limit: '100'
  });
  if(!data || !data.data) return null;
  const ads = data.data.map(ad => {
    const ins = (ad.insights && ad.insights.data && ad.insights.data[0]) || {};
    const thumb = ad.creative && (ad.creative.thumbnail_url || ad.creative.image_url || '');
    return {
      name: ad.name, reach: parseInt(ins.reach||0), imp: parseInt(ins.impressions||0),
      cpm_clp: parseFloat(ins.cpm||0)*TC, tag: '', img: thumb
    };
  }).filter(a => a.reach > 0).sort((a,b) => b.reach - a.reach);
  return ads.length ? ads : null;
}

/* Fallback data (referencia histórica) */
const ADS_FALLBACK = [
  {name:'colegios y equipos ya usan Actas', reach:2491, imp:2895, cpm_clp:362, tag:'best', img:''},
  {name:'Reunión sin decisiones claras', reach:920, imp:1015, cpm_clp:371, tag:'', img:''},
  {name:'Ideal para empresas y colegios', reach:435, imp:473, cpm_clp:368, tag:'video', img:''},
  {name:'Dejar el acta para última hora', reach:945, imp:1049, cpm_clp:382, tag:'', img:''},
  {name:'Antes de Actas: horas redactando', reach:1178, imp:1271, cpm_clp:524, tag:'warn', img:''},
];

/* ── Parsear datos de campañas ──────────────────────────────── */
function parseCampañas(rows){
  return rows.slice(4).filter(r => r[0] && r[0] !== 'TOTAL').map(r => ({
    nombre: String(r[0]),
    gastoCLP: nv(r[1]),
    gastoUSD: nv(r[2]),
    impresiones: nv(r[3]),
    clicks: nv(r[4]),
    ctr: nv(r[5]),
    cpcCLP: nv(r[6]),
    cpmCLP: nv(r[7]),
    alcance: nv(r[8]),
    frecuencia: nv(r[9]),
    lpv: nv(r[10])
  }));
}

/* ── Render Google Ads ──────────────────────────────────────── */
// Foco: VENTA (conversiones, CPA, ROAS) — no awareness
// Pestaña "Google Ads" del Sheet: Campaña | Gasto USD | Conv. | CPA USD | ROAS | Clics | CTR | CPC USD | Impr.
function renderGoogleAds(gaData){
  const el = document.getElementById('google-ads-section'); if(!el) return;

  let rows = [];
  let fromSheet = false;

  if(gaData && gaData.length > 1){
    const dataRows = gaData.slice(1).filter(r => r[0] && r[0] !== 'TOTAL' && r[0] !== 'Total');
    if(dataRows.length > 0){
      rows = dataRows.map(r => ({
        camp: String(r[0]), sub: String(r[9]||'Search · CO'),
        gastoUSD: nv(r[1]), conv: nv(r[2]), cpa: nv(r[3]),
        roas: nv(r[4]), clics: nv(r[5]), ctr: nv(r[6]),
        cpcUSD: nv(r[7]), imp: nv(r[8])
      }));
      fromSheet = true;
    }
  }

  // Fallback: 2 campañas con datos de referencia Data Studio
  if(!fromSheet){
    rows = [
      {camp:'Campaña 1 · Google Ads', sub:'Search · CO · Venta',
       gastoUSD:11.20, conv:3, cpa:3.73, roas:4.8, clics:412, ctr:5.1, cpcUSD:0.027, imp:8078},
      {camp:'Campaña 2 · Google Ads', sub:'Search · CO · Venta',
       gastoUSD:8.40,  conv:2, cpa:4.20, roas:4.5, clics:298, ctr:4.9, cpcUSD:0.028, imp:6082},
    ]; // estimado junio 2026 · actualizar con datos reales de Google Ads
  }

  const totGasto = rows.reduce((s,r)=>s+r.gastoUSD,0);
  const totConv  = rows.reduce((s,r)=>s+r.conv,0);
  const totClics = rows.reduce((s,r)=>s+r.clics,0);
  const totImp   = rows.reduce((s,r)=>s+r.imp,0);
  const avgCPA   = totConv > 0 ? totGasto/totConv : 0;
  const avgROAS  = rows.filter(r=>r.gastoUSD>0).reduce((s,r,_,a)=>s+r.roas/a.length,0);

  el.innerHTML = `
  ${!fromSheet ? `<div class="notice" style="background:#FFF8E1;border-color:#FFE082;color:#795548;margin-bottom:12px">
    Datos estimados junio 2026. Para datos en tiempo real agrega una pestaña <strong>"Google Ads"</strong> al Sheet con columnas: Campaña · Gasto USD · Conv. · CPA · ROAS · Clics · CTR · CPC · Impr.
  </div>` : ''}
  <div class="kgrid" style="margin-bottom:14px">
    <div class="kcard">
      <div class="kcard-lbl">Gasto ${fromSheet?'período':'junio 2026 est.'}</div>
      <div class="kcard-val">${fU(totGasto)}</div>
      <div class="kcard-sub">USD · Google Ads</div>
    </div>
    <div class="kcard">
      <div class="kcard-lbl">Ventas</div>
      <div class="kcard-val" style="color:#27500A">${fN(totConv)}</div>
      <div class="kcard-sub">conversiones ${fromSheet?'período':'junio est.'}</div>
    </div>
    <div class="kcard">
      <div class="kcard-lbl">CAC</div>
      <div class="kcard-val">${fU(avgCPA)}</div>
      <div class="kcard-sub">USD / venta</div>
      <div class="kcard-delta neutral">ROAS ${avgROAS.toFixed(1)}×</div>
    </div>
    <div class="kcard">
      <div class="kcard-lbl">Clics</div>
      <div class="kcard-val">${fN(totClics)}</div>
      <div class="kcard-sub">CTR ${totImp>0?fPct(totClics/totImp*100):'—'} · ${(totImp/1000).toFixed(1)}k impr.</div>
    </div>
  </div>
  <table class="tbl">
    <thead><tr>
      <th>Campaña</th>
      <th>Gasto USD</th>
      <th>Ventas</th>
      <th>CPA USD</th>
      <th>ROAS</th>
      <th>Clics</th>
      <th>CTR</th>
      <th>CPC USD</th>
    </tr></thead>
    <tbody>
    ${rows.map(r => {
      const best = r.roas === Math.max(...rows.map(x=>x.roas));
      return `<tr>
        <td>
          <div class="camp-name">${r.camp}${best?'<span class="chip chip-g" style="margin-left:4px">★ mejor ROAS</span>':''}</div>
          <div class="camp-sub">${r.sub}</div>
        </td>
        <td>${fU(r.gastoUSD)}</td>
        <td style="color:#27500A;font-weight:600">${fN(r.conv)}</td>
        <td>${fU(r.cpa)}</td>
        <td style="color:#534AB7;font-weight:600">${r.roas.toFixed(1)}×</td>
        <td>${fN(r.clics)}</td>
        <td>${fPct(r.ctr)}</td>
        <td>${fU(r.cpcUSD)}</td>
      </tr>`;
    }).join('')}
    <tr>
      <td>Total</td>
      <td>${fU(totGasto)}</td>
      <td style="color:#27500A;font-weight:600">${fN(totConv)}</td>
      <td>${fU(avgCPA)}</td>
      <td style="color:#534AB7;font-weight:600">${avgROAS.toFixed(1)}×</td>
      <td>${fN(totClics)}</td>
      <td>${totImp>0?fPct(totClics/totImp*100):'—'}</td>
      <td>—</td>
    </tr>
    </tbody>
  </table>
  <div style="margin-top:10px;padding:8px 10px;background:#f5f5f7;border-radius:6px;font-size:10px;color:#636366;line-height:1.7">
    <strong style="color:#534AB7">ROAS</strong> (Return on Ad Spend): por cada $1 invertido en publicidad, se generan $${avgROAS.toFixed(1)} en ingresos. Un ROAS mayor a 1 es rentable; el benchmark para e-commerce en Colombia es entre 3× y 5×.
    &nbsp;·&nbsp; <strong style="color:#3a3a3c">CAC</strong> (Costo de Adquisición de Cliente): cuánto cuesta conseguir una venta = inversión total ÷ número de conversiones.
  </div>`;
}

/* ── Render grilla de anuncios ──────────────────────────────── */
function _drawAdGrid(container, ads){
  const mx = Math.max(...ads.map(a => a.cpm_clp), 1);
  container.innerHTML = '<div class="ad-grid">'+ads.map((ad, i) => {
    const cu = usd(ad.cpm_clp);
    const rec = Math.round(ad.reach * AR_BENCH / 100);
    const upr = rec > 0 ? cu * ad.reach / 1000 / rec : 0;
    const pct = Math.round(ad.cpm_clp / mx * 100);
    const cls = ad.tag==='warn'||ad.tag==='pause' ? 'warn' : ad.tag==='best' ? 'best' : '';
    const chip = ad.tag==='best' ? '<span class="chip chip-g">★ mejor</span>'
                : ad.tag==='warn'||ad.tag==='pause' ? '<span class="chip chip-r">pausar</span>'
                : ad.tag==='video' ? '<span class="chip chip-p">Video</span>' : '';
    const imgHtml = ad.img
      ? `<div class="ad-img"><img src="${ad.img}" alt="${ad.name}" onerror="this.parentElement.textContent='📷'"></div>`
      : `<div class="ad-img pulsing" id="ad-img-${i}">📷</div>`;
    return `<div class="ad-card ${cls}">${imgHtml}
      <div class="ad-body">
        <div class="ad-name">${ad.name.replace(/PH_/g,'')} ${chip}</div>
        <div class="ad-stat"><span class="ad-lbl">Alcance</span><span class="ad-val">${fN(ad.reach)}</span></div>
        <div class="ad-stat"><span class="ad-lbl">Impr.</span><span class="ad-val">${fN(ad.imp)}</span></div>
        <div class="ad-bar"><div class="ad-bar-fill" style="width:${pct}%"></div></div>
        <div class="ad-stat"><span class="ad-lbl">CPM</span><span class="ad-val" style="color:${cu>1?'#A32D2D':'inherit'}">${fU(cu)}</span></div>
        <div class="ad-recall">~${fN(rec)} recall · ${fU3(upr)}/persona</div>
      </div>
    </div>`;
  }).join('')+'</div>';
}

function renderAnuncios(anData, elId){
  const el = document.getElementById(elId); if(!el) return;
  // 1. Desde pestaña 'anuncios' del Sheet
  if(anData && anData.length > 1 && anData.slice(1).some(r=>r[0])){
    const ads = anData.slice(1).filter(r=>r[0]).map(r=>({
      name: String(r[0]), reach: nv(r[1]), imp: nv(r[2]), cpm_clp: nv(r[3]),
      tag: String(r[4]||'').toLowerCase().trim(), img: ''
    }));
    _drawAdGrid(el, ads);
  } else if(getToken()){
    // 2. Fallback Meta API directa
    el.innerHTML = '<div style="padding:16px;text-align:center;color:#534AB7;font-size:11px">Cargando anuncios desde Meta Ads API…</div>';
    loadAdMetricsFromMeta().then(ads => {
      if(ads && ads.length){ _drawAdGrid(el, ads); }
      else { _drawAdGrid(el, ADS_FALLBACK); }
    });
  } else {
    // 3. Sin token: datos históricos de referencia

  const totalLPV = nv(totRow[10]) || camps.reduce((s,c)=>s+c.lpv,0);

      plugins: { legend: { display: false }, tooltip: { callbacks: { label: ctx => ' '+fN(ctx.raw)+' personas' } } },
      scales: {
        y: { ticks: { font:{size:10}, color:'#8e8e93', callback: v => v>=1000?(v/1000).toFixed(0)+'k':v }, grid: { color:'#f2f2f7' } },
        x: { ticks: { font:{size:10}, color:'#8e8e93', autoSkip:false }, grid: { display:false } }
      }
    }
  });

  new Chart(document.getElementById('cpmChart'), {
    type: 'bar',
    data: {
      labels: campNames,
      datasets: [{ data: camps.map(c=>parseFloat(usd(c.cpmCLP).toFixed(3))), backgroundColor: cpmColors, borderRadius: 4 }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false }, tooltip: { callbacks: { label: ctx => ' $'+ctx.raw.toFixed(3)+' USD' } } },
      scales: {
        y: { ticks: { font:{size:10}, color:'#8e8e93', callback: v=>'$'+v.toFixed(2) }, grid: { color:'#f2f2f7' } },
        x: { ticks: { font:{size:10}, color:'#8e8e93', autoSkip:false }, grid: { display:false } }
      }
    }
  });

  if(document.getElementById('vsChart')){
    new Chart(document.getElementById('vsChart'), {
      type: 'bar',
      data: {
        labels: ['Gasto USD', 'Alcance (miles)', 'Impresiones (miles)'],
        datasets: [
          { label: mesCap()+' 2026', data: [totalUSD, totalAlcance/1000, totalImp/1000], backgroundColor: '#7F77DD', borderRadius: 4 },
          { label: MESES[NOW.getMonth()-1]||'Mes ant.', data: [totalUSDPrev, totalAlcancePrev/1000, totalImpPrev/1000], backgroundColor: '#B4B2A9', borderRadius: 4 }
        ]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { display: false } },
        scales: {
          y: { ticks: { font:{size:10}, color:'#8e8e93' }, grid: { color:'#f2f2f7' } },
          x: { ticks: { font:{size:10}, color:'#8e8e93', autoSkip:false }, grid: { display:false } }
        }
      }
    });
  }
}

/* ── Main ──────────────────────────────────────────────────── */
async function main(){
  try {
    const [actual, anterior, estado, resumen, anData, gaData, ga4Sheet, ga4Ciudades] = await Promise.all([
      fetchSheet('Mes Actual'),
      fetchSheet('Mes Anterior').catch(()=>null),
      fetchSheet('Estado').catch(()=>null),
      fetchSheet('Resumen').catch(()=>null),
      fetchSheet('anuncios').catch(()=>null),
      fetchSheet('Google Ads').catch(()=>null),
      fetchSheet('GA4').catch(()=>null),
      fetchSheet('GA4_Ciudades').catch(()=>null)
    ]);
    render(actual, anterior, estado, resumen, anData, gaData, ga4Sheet, ga4Ciudades);
  } catch(e){
    document.getElementById('root').innerHTML = `
      <div style="background:#fff3e0;border:1px solid #ffe0b2;border-radius:10px;padding:16px 20px;color:#e65100">
        <strong>Error cargando datos:</strong> ${e.message}<br>
        <span style="font-size:11px;margin-top:6px;display:block">
          Verifica que el Google Sheet sea público o esté compartido correctamente.<br>
          Sheet ID: ${SHEET_ID}
        </span>
      </div>`;
  }
}

main();
</script>
